name: app
description: "CargApp - Comparador de precios de combustible en Chile"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP
  http: ^1.2.0
  
  # Estado global
  provider: ^6.1.2
  
  # Almacenamiento local (guardar token)
  shared_preferences: ^2.2.3
  
  # Mapas
  google_maps_flutter: ^2.6.0
  
  # GPS
  geolocator: ^11.0.0
  
  # Íconos
  cupertino_icons: ^1.0.6
  url_launcher: ^6.3.2

  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/logos/